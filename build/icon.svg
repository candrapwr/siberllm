<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="sl" x1="120" y1="140" x2="392" y2="372" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e0f2fe"/>
    </linearGradient>
  </defs>

  <!-- rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- circuit / AI accent dots -->
  <circle cx="392" cy="120" r="14" fill="#7dd3fc" opacity="0.9"/>
  <circle cx="120" cy="392" r="10" fill="#7dd3fc" opacity="0.7"/>
  <circle cx="424" cy="200" r="6" fill="#bae6fd" opacity="0.6"/>

  <!-- SL monogram -->
  <text x="256" y="256"
        font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
        font-size="260" font-weight="800"
        text-anchor="middle" dominant-baseline="central"
        fill="url(#sl)">SL</text>
</svg>
